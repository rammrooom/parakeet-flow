name: macOS CI

on:
  push:
    branches: [main]
    paths:
      - 'mac/**'
      - '.github/workflows/mac-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mac/**'
      - '.github/workflows/mac-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM dependencies
        uses: actions/cache@v6
        with:
          path: mac/DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('mac/Package.swift', 'mac/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: mac
        run: xcodegen generate

      - name: Build
        working-directory: mac
        run: >
          xcodebuild build -scheme ParakeetFlow -configuration Debug
          -clonedSourcePackagesDirPath DerivedData/SourcePackages
          -quiet

      - name: Test
        working-directory: mac
        run: >
          xcodebuild test -scheme ParakeetFlow -configuration Debug
          -clonedSourcePackagesDirPath DerivedData/SourcePackages
          -quiet
