name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"

          if [ -n "$KEYSTORE_BASE64" ]; then
            # Persistent keystore from repository secrets — APKs share one
            # signature, so new versions install over old ones (see docs/SIGNING.md).
            echo "Using persistent keystore from repository secrets"
            echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            echo "RELEASE_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "RELEASE_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            # Fallback: ephemeral keystore. Each release is signed with a fresh
            # key, so updates require uninstalling the previous version first.
            echo "No RELEASE_KEYSTORE_BASE64 secret set — generating an ephemeral keystore"
            GEN_PASSWORD="$(openssl rand -base64 32)"
            keytool -genkeypair \
              -alias release \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$GEN_PASSWORD" \
              -keypass "$GEN_PASSWORD" \
              -dname "CN=ParakeetFlow, O=ParakeetFlow"
            echo "RELEASE_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "RELEASE_KEYSTORE_PASSWORD=$GEN_PASSWORD" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_ALIAS=release" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_PASSWORD=$GEN_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease -x lintVitalRelease

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  publish:
    needs: [build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: android-apk

      - name: Rename APK
        run: mv app-release.apk ParakeetFlow-${GITHUB_REF_NAME}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ParakeetFlow-*.apk
          generate_release_notes: true
