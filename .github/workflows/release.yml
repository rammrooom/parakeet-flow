name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Create self-signed certificate
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "build" $KEYCHAIN_PATH
          security set-keychain-settings $KEYCHAIN_PATH
          security unlock-keychain -p "build" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          cat > codesign.cnf <<CNFEOF
          [req]
          distinguished_name = req_dn
          [req_dn]
          [v3_cs]
          keyUsage = critical, digitalSignature
          extendedKeyUsage = codeSigning
          CNFEOF
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem \
            -days 1 -nodes -subj "/CN=ParakeetFlow Self-Signed" \
            -extensions v3_cs -config codesign.cnf
          openssl pkcs12 -export -out cert.p12 -inkey key.pem -in cert.pem \
            -password pass:build -legacy

          security import cert.p12 -k $KEYCHAIN_PATH -P build \
            -T /usr/bin/codesign -T /usr/bin/security
          sudo security add-trusted-cert -d -r trustRoot \
            -k $KEYCHAIN_PATH cert.pem
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "build" $KEYCHAIN_PATH

          security find-identity -v -p codesigning $KEYCHAIN_PATH

          rm -f key.pem cert.pem cert.p12 codesign.cnf

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: mac/DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('mac/Package.swift', 'mac/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: mac
        run: xcodegen generate

      - name: Build release
        working-directory: mac
        run: >
          xcodebuild build -scheme ParakeetFlow -configuration Release
          -clonedSourcePackagesDirPath DerivedData/SourcePackages
          -derivedDataPath build
          CODE_SIGN_STYLE=Manual
          CODE_SIGN_IDENTITY="ParakeetFlow Self-Signed"
          OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"
          -quiet

      - name: Run tests
        working-directory: mac
        run: >
          xcodebuild test -scheme ParakeetFlow -configuration Debug
          -clonedSourcePackagesDirPath DerivedData/SourcePackages
          -quiet

      - name: Create DMG
        run: |
          APP_PATH="mac/build/Build/Products/Release/ParakeetFlow.app"
          DMG_NAME="ParakeetFlow-${GITHUB_REF_NAME}.dmg"

          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create -volname "ParakeetFlow" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: ${{ env.DMG_NAME }}

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db"

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"

          if [ -n "$KEYSTORE_BASE64" ]; then
            # Persistent keystore from repository secrets — APKs share one
            # signature, so new versions install over old ones (see docs/SIGNING.md).
            echo "Using persistent keystore from repository secrets"
            echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            echo "RELEASE_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "RELEASE_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            # Fallback: ephemeral keystore. Each release is signed with a fresh
            # key, so updates require uninstalling the previous version first.
            echo "No RELEASE_KEYSTORE_BASE64 secret set — generating an ephemeral keystore"
            GEN_PASSWORD="$(openssl rand -base64 32)"
            keytool -genkeypair \
              -alias release \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$GEN_PASSWORD" \
              -keypass "$GEN_PASSWORD" \
              -dname "CN=ParakeetFlow, O=ParakeetFlow"
            echo "RELEASE_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "RELEASE_KEYSTORE_PASSWORD=$GEN_PASSWORD" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_ALIAS=release" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_PASSWORD=$GEN_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease -x lintVitalRelease

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  publish:
    needs: [build-mac, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg

      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: android-apk

      - name: Rename APK
        run: mv app-release.apk ParakeetFlow-${GITHUB_REF_NAME}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ParakeetFlow-*.dmg
            ParakeetFlow-*.apk
          generate_release_notes: true
